<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Password Generator</title>
      <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="style.css" type="text/css" media="all" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
   </head>
   <body>
      <div class="card">
         <header>
            <div class="icon-lock">
               <i class="fa-solid fa-lock"></i>
            </div>
            <div>
               <h1>PASS<span>GEN</span></h1>
               <div class="subtitle">
                  Secure Password Generator
               </div>
            </div>
         </header>
         <!-- Output -->
         <div class="output-wrap">
            <div class="output-label">
               Generated Password
            </div>
            <div class="password-box">
               <div id="password-output">
                  Click generate to create a password
               </div>
               <button class="copy-btn" id="copy-icon-btn" title="Copy password">
                  <svg id="copy-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                     <rect x="9" y="9" width="13" height="13" rx="2" />
                     <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
               </button>
            </div>
         </div>
         <!-- Strength -->
         <div class="strength-bar-wrap">
            <span id="strength-label">—</span>
            <div class="bar-track">
               <div class="bar-seg" id="seg1"></div>
               <div class="bar-seg" id="seg2"></div>
               <div class="bar-seg" id="seg3"></div>
               <div class="bar-seg" id="seg4"></div>
            </div>
         </div>
         <!-- Length -->
         <div class="section">
            <div class="section-header">
               <span class="section-label">Length</span>
               <span class="length-val" id="length-display">16</span>
            </div>
            <input type="range" id="length-slider" min="6" max="64" value="16" />
         </div>
         <!-- Options -->
         <div class="options-grid">
            <label class="option-item active" id="opt-upper">
               <input type="checkbox" checked id="chk-upper" />
               <div class="check-box">
                  <i class="fa-solid fa-check"></i>
               </div>
               <span class="option-text">Uppercase</span>
            </label>
            <label class="option-item active" id="opt-lower">
               <input type="checkbox" checked id="chk-lower" />
               <div class="check-box">
                  <i class="fa-solid fa-check"></i>
               </div>
               <span class="option-text">Lowercase</span>
            </label>
            <label class="option-item active" id="opt-numbers">
               <input type="checkbox" checked id="chk-numbers" />
               <div class="check-box">
                  <i class="fa-solid fa-check"></i>
               </div>
               <span class="option-text">Numbers</span>
            </label>
            <label class="option-item active" id="opt-symbols">
               <input type="checkbox" checked id="chk-symbols" />
               <div class="check-box">
                  <i class="fa-solid fa-check"></i>
               </div>
               <span class="option-text">Symbols</span>
            </label>
         </div>
         <!-- Actions -->
         <div class="actions">
            <button class="btn-generate" id="generate-btn"><i class="fa-solid fa-bolt"></i> Generate</button>
         </div>
      </div>
      <div class="toast" id="toast">
         Copied!
      </div>
      <script src="script.js" type="text/javascript" charset="utf-8"></script>
   </body>
</html>
